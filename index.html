// ─── GEBURTSTAGE ──────────────────────────────────────────────────────────────
// geburtstag wird als ISO 'YYYY-MM-DD' gespeichert. Alter wird nur bei plausiblem Jahr angezeigt.
const gebAlter=(iso,ref)=>{if(!iso)return null;const b=new Date(iso+'T00:00:00');if(isNaN(b))return null;const r=ref||new Date();let a=r.getFullYear()-b.getFullYear();const m=r.getMonth()-b.getMonth();if(m<0||(m===0&&r.getDate()<b.getDate()))a--;return(a>=0&&a<120)?a:null;};
// Tage bis zum naechsten Geburtstag (heute = 0)
const tageBisGeb=iso=>{if(!iso)return null;const b=new Date(iso+'T00:00:00');if(isNaN(b))return null;const n=new Date();const r=new Date(n.getFullYear(),n.getMonth(),n.getDate());let next=new Date(r.getFullYear(),b.getMonth(),b.getDate());if(next<r)next=new Date(r.getFullYear()+1,b.getMonth(),b.getDate());return Math.round((next-r)/86400000);};
// Personen mit Geburtstag, sortiert nach naechstem Termin; wirdAlt = Alter am naechsten Geburtstag
const naechsteGeburtstage=people=>(people||[]).filter(p=>p&&p.geburtstag).map(p=>{const tage=tageBisGeb(p.geburtstag);const cur=gebAlter(p.geburtstag);return{...p,tage,wirdAlt:cur==null?null:(tage===0?cur:cur+1)};}).sort((a,b)=>(a.tage??999)-(b.tage??999));
const gebTageText=t=>t==null?'':t===0?'heute 🎉':t===1?'morgen':'in '+t+' Tagen';
const gebRolle=p=>p.rolle||p.position||p.funktion||'';
// Geburtstags-Vorkommen (als Pseudo-Termine {_geb:true}) im Zeitraum [startIso,endIso] – fuer den PDF-Plan.
function gebOccurrences(people,startIso,endIso){
  const out=[];if(!startIso||!endIso)return out;
  const ys=+startIso.slice(0,4),ye=+endIso.slice(0,4);
  (people||[]).forEach(p=>{
    if(!p||!p.geburtstag||!p.name||p.geburtstag.length<10)return;
    const mmdd=p.geburtstag.slice(5);
    for(let y=ys;y<=ye;y++){const iso=y+'-'+mmdd;if(iso>=startIso&&iso<=endIso)out.push({_geb:true,date:iso,name:p.name,rolle:gebRolle(p),alter:p.istStaff?null:gebAlter(p.geburtstag,new Date(iso+'T00:00:00'))});}
  });
  return out;
}

// ─── BERECHNUNGEN ─────────────────────────────────────────────────────────────
// Nordmazedonien: keine Arbeitgeber-Lohnnebenkosten. Sozialabgaben (28%) und
// Lohnsteuer (10% Flat-Tax) trägt der Arbeitnehmer, vom Brutto einbehalten.
const MK_SOZ=0.28; // Rente 18,8% + Kranken 7,5% + Arbeitslosen 1,2% + Zusatz-KV 0,5%
const MK_STEUER=0.10; // einheitliche Lohnsteuer auf das zu versteuernde Einkommen
const MK_FREIBETRAG_MONAT=167; // pers. Freibetrag ca. 123.240 MKD/Jahr, umgerechnet (~61,5 MKD/EUR)
const mkNetto=bm=>{
  const sozialabgaben=bm*MK_SOZ;
  const steuerpflichtig=Math.max(0,bm-sozialabgaben-MK_FREIBETRAG_MONAT);
  const steuer=steuerpflichtig*MK_STEUER;
  return {sozialabgaben,steuer,netto:bm-sozialabgaben-steuer};
};

function calcP(p){
  const bm=p.bruttoMonat||0, bj=bm*12, dur=Math.max(1,p.durationMonths??SAISON_REST);
  const mb=bm, sb=mb*dur;
  const fkJ=(p.fahrtkosten||0)*12; // Fahrtkostenerstattung (steuerfrei)
  const zs=fkJ/12*dur;
  const mbTotal=mb+fkJ/12;
  return {bj,mb,mbTotal,sb,fkJ,zs,ges:sb+zs,...mkNetto(bm)};
}
function calcS(s){
  const bm=s.bruttoMonat||0, bj=bm*12, dur=Math.max(1,s.durationMonths??SAISON_REST);
  const jb=bj+(s.bonusYear||0), mb=jb/12, sb=mb*dur;
  return {bj,jb,mb,mbTotal:mb,sb,ges:sb,...mkNetto(bm)};
}
const costYr=(c,tg)=>{const b=(c.amount||0)*(c.quantity||1);return c.frequency==='monthly'?b*12:c.frequency==='per_game'?b*(tg||36):b;};
const costMo=(c,m,g)=>{const b=(c.amount||0)*(c.quantity||1);if(c.frequency==='monthly')return b;if(c.frequency==='per_game')return b*g;if(c.frequency==='yearly')return b/12;if(c.frequency==='once')return(c.month||0)===m?b:0;return 0;};
const incYr=i=>{const b=(i.amount||0)*(i.quantity||1);return i.frequency==='monthly'?b*12:b;};
const incMo=(i,m)=>{const b=(i.amount||0)*(i.quantity||1);if(i.frequency==='monthly')return b;if(i.frequency==='yearly')return b/12;if(i.frequency==='once')return(i.month||0)===m?b:0;return 0;};

        <h2 className="text-red-600 font-bold text-lg mb-2">Fehler beim Laden</h2>

// className steuert die Schriftgröße (Emoji) bzw. via h-/w-[1em] auch die Bildgröße.
function TypIcon({t,className=''}){
  if(t&&t.img&&t.img.indexOf('data:')===0)return <img src={t.img} alt="" draggable={false} className={cx('inline-block object-contain align-[-0.2em] bg-white rounded-[3px] p-[1px]',className)}/>;
  return <span className={className}>{t?t.icon:''}</span>;
}

// Reihenfolge verschieben – funktioniert auch mit gefilterten/gruppierten Listen
const swapById=(arr,id1,id2)=>{const i=arr.findIndex(x=>x.id===id1),j=arr.findIndex(x=>x.id===id2);if(i<0||j<0)return arr;const a=[...arr];[a[i],a[j]]=[a[j],a[i]];return a;};
function MoveBtn({items,index,allItems,onChange}){
  const canUp=index>0,canDown=index<items.length-1;
  return(
    <span className="flex flex-col items-center -my-1">
      <button onClick={()=>onChange(swapById(allItems,items[index].id,items[index-1].id))} disabled={!canUp} className="text-xs text-muted-foreground hover:text-foreground disabled:opacity-20 cursor-pointer disabled:cursor-default leading-none p-0.5" title="Nach oben">▲</button>
      <button onClick={()=>onChange(swapById(allItems,items[index].id,items[index+1].id))} disabled={!canDown} className="text-xs text-muted-foreground hover:text-foreground disabled:opacity-20 cursor-pointer disabled:cursor-default leading-none p-0.5" title="Nach unten">▼</button>
    </span>
  );
}

// Löschen mit Inline-Bestätigung – kein window.confirm
function DelBtn({onDelete}){
  const [ask,setAsk]=useState(false);
  if(ask)return(
    <span className="flex items-center gap-1 text-xs whitespace-nowrap">
      <span className="text-muted-foreground">Sicher?</span>
      <button onClick={()=>{onDelete();setAsk(false);}} className="text-red-600 font-bold cursor-pointer px-1 hover:underline">Ja</button>
      <button onClick={()=>setAsk(false)} className="text-muted-foreground cursor-pointer px-1 hover:underline">Nein</button>
    </span>
  );
  return <button onClick={()=>setAsk(true)} title="Löschen" className="hover:text-red-500 transition-colors cursor-pointer p-1 rounded">🗑</button>;
}

// ─── KADER PAGE ───────────────────────────────────────────────────────────────
function KaderPage({players,onChange}){
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const list=players||[];
  const tots=useMemo(()=>list.reduce((a,p)=>{const c=calcP(p);const ms=(p.rentMonthly||0)*(p.rentMonths||0);return{bj:a.bj+c.bj,sb:a.sb+c.sb,ges:a.ges+c.ges+ms};},{bj:0,sb:0,ges:0}),[list]);
  const save=p=>{onChange(editing?players.map(x=>x.id===p.id?p:x):[...players,p]);setModal(false);setEditing(null);};
  const csv=()=>{
    const rows=[['Name','Position','Brutto/M','Brutto/J','Sozialabgaben/M','Lohnsteuer/M','Netto/M','Saison','Miete','Gesamt','Kommentar','Punktprämie/Pkt','Einsatzprämie/Einsatz','Aufstiegsprämie','Pokalprämie']];
    list.forEach(p=>{const c=calcP(p);const ms=(p.rentMonthly||0)*(p.rentMonths||0);rows.push([p.name,p.position,p.bruttoMonat,Math.round(c.bj),Math.round(c.sozialabgaben),Math.round(c.steuer),Math.round(c.netto),Math.round(c.sb),Math.round(ms),Math.round(c.ges+ms),p.notes||'',p.praemiePunkt||0,p.praemieEinsatz||0,p.praemieAufstieg||0,p.praemiePokal||0]);});
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.map(r=>r.join(';')).join('\n'));a.download='kader.csv';a.click();
  };
  return(
    <div className="p-4 md:p-6 space-y-5">
      <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div><h1 className="text-xl font-bold">Kader</h1><p className="text-sm text-muted-foreground">{list.length} Spieler &middot; {fmt(tots.ges)} Fixkosten</p></div>
        <div className="flex gap-2">
          <Btn variant="outline" onClick={csv}>CSV</Btn>
          <Btn onClick={()=>{setEditing(null);setModal(true);}}>+ Spieler hinzufügen</Btn>
        </div>
      </div>
      <Card>
        {list.length===0
          ?<Empty msg="Noch keine Spieler im Kader." action={<Btn onClick={()=>{setEditing(null);setModal(true);}}>+ Spieler hinzufügen</Btn>}/>
          :<div className="overflow-x-auto"><table className="w-full text-sm">
            <thead><tr className="border-b border-border text-xs text-muted-foreground uppercase tracking-wide text-left">
              <th className="px-4 py-3 w-8"></th>
              <th className="px-4 py-3">Name</th><th className="px-4 py-3">Position</th>
              <th className="px-4 py-3 text-right">Brutto/M</th>
              <th className="px-4 py-3 text-right text-violet-600" title="Brutto-Äquivalent: reguläres Brutto + steuerfreie Vorteile (Fahrtkosten, Wohnung) hochgerechnet auf ~35% Abgaben">Paket-Äq.†</th>
              <th className="px-4 py-3 text-right">AG/M</th>
              <th className="px-4 py-3 text-right">Saison</th><th className="px-4 py-3 text-right">Miete</th>
              <th className="px-4 py-3 text-right font-semibold">Gesamt</th>
              <th className="px-4 py-3 text-right">Prämien</th>
              <th className="px-4 py-3">Kommentar</th>
              <th className="px-4 py-3"></th>
            </tr></thead>
            <tbody>
              {list.map((p,pi)=>{
                const c=calcP(p);
                const ms=(p.rentMonthly||0)*(p.rentMonths||0);
                const pot=(p.praemiePunkt||0)*70+(p.praemieEinsatz||0)*28+(p.praemieAufstieg||0)+(p.praemiePokal||0);
                return(
                  <tr key={p.id} className="border-b border-border/50 hover:bg-muted/30 transition-colors">
                    <td className="px-4 py-1.5 w-8"><MoveBtn items={list} index={pi} allItems={players} onChange={onChange}/></td>
                    <td className="px-4 py-2.5 font-medium">{p.name||'-'}</td>
                    <td className="px-4 py-2.5 text-muted-foreground">{p.position||'-'}</td>
                    <td className="px-4 py-2.5 text-right">{fmt(p.bruttoMonat)}</td>
                    <td className="px-4 py-2.5 text-right text-violet-600 font-medium">{fmt((p.bruttoMonat||0)+((p.fahrtkosten||0)+(p.rentMonthly||0))*GROSS_UP)}</td>
                    <td className="px-4 py-2.5 text-right text-muted-foreground">{fmt(c.mbTotal)}</td>
                    <td className="px-4 py-2.5 text-right">{fmt(c.sb)}</td>

                    <td className="px-4 py-2.5 text-right font-semibold text-primary">{fmt(c.ges+ms)}</td>
                    <td className="px-4 py-2.5 text-right text-amber-600 text-xs italic">{pot>0?('ca. '+fmt(pot)):'-'}</td>
                    <td className="px-4 py-2.5 text-muted-foreground text-xs max-w-36">
                      {p.notes?<span title={p.notes} className="block truncate">{p.notes}</span>:'-'}
                    </td>

function KostenPage({costs,spielplan,onChange}){
  const [modal,setModal]=useState(false);

  const filtered=useMemo(()=>(costs||[]).filter(c=>fCat==='Alle'||c.category===fCat),[costs,fCat]);
  const total=useMemo(()=>filtered.reduce((s,c)=>s+costYr(c,totalGames),0),[filtered,totalGames]);
  const grouped=useMemo(()=>{
    const g={};
    filtered.forEach(c=>{const key=c.subcategory?(c.category+' > '+c.subcategory):c.category;if(!g[key])g[key]={label:key,items:[],total:0};g[key].items.push(c);g[key].total+=costYr(c,totalGames);});

            </div>
            <div className="overflow-x-auto"><table className="w-full text-sm">

                <th className="px-5 py-2 text-left">Beschreibung</th>

              <tbody>{g.items.map((c,ci)=>(
                <tr key={c.id} className="border-b border-border/30 hover:bg-muted/20 transition-colors">
                  <td className="px-5 py-1 w-8"><MoveBtn items={g.items} index={ci} allItems={costs} onChange={onChange}/></td>

        ))
      }
      <Modal open={modal} onClose={()=>{setModal(false);setEditing(null);}} title={editing?'Kostenstelle bearbeiten':'Neue Kostenstelle'} wide>

  );
}

// ─── LIQUIDITÄT PAGE ──────────────────────────────────────────────────────────
function LiquiditaetPage({players,staff,costs,income,spielplan,setSpielplan}){
  const chartRef=useRef(null);
  const chartInst=useRef(null);

  const monthly=useMemo(()=>MONTHS.map((label,m)=>{
    const g=spielplan[m]||0;
    const playerCost=(players||[]).reduce((sum,p)=>{
      const c=calcP(p);
      let cost=0;
      if(m<(p.durationMonths??SAISON_REST)) cost+=c.mb+c.fkJ/12;
      if(m<(p.rentMonths||0)) cost+=(p.rentMonthly||0);
      return sum+cost;
    },0);
    const staffCost=(staff||[]).reduce((sum,s)=>m<(s.durationMonths??SAISON_REST)?sum+calcS(s).mbTotal:sum,0);
    const costTotal=(costs||[]).reduce((sum,c)=>sum+costMo(c,m,g),0);
    const incTotal=(income||[]).reduce((sum,i)=>sum+incMo(i,m),0);
    const totalOut=playerCost+staffCost+costTotal;
    return{label,incTotal,totalOut,playerCost,staffCost,costTotal,games:g,net:incTotal-totalOut};
  }),[players,staff,costs,income,spielplan]);

  const cumul=useMemo(()=>{let a=0;return monthly.map(m=>{a+=m.net;return a;});},[monthly]);
  const totInc=monthly.reduce((s,m)=>s+m.incTotal,0);
  const totOut=monthly.reduce((s,m)=>s+m.totalOut,0);

  useEffect(()=>{
    if(!chartRef.current||typeof Chart==='undefined')return;
    const isDark=document.documentElement.classList.contains('dark');
    const gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
    const tc=isDark?'#9ca3af':'#6b7280';
    if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}
    chartInst.current=new Chart(chartRef.current,{
      data:{labels:MONTHS,datasets:[
        {type:'bar',label:'Einnahmen',data:monthly.map(m=>m.incTotal),backgroundColor:'rgba(16,185,129,0.7)',borderColor:'rgb(16,185,129)',borderWidth:1,order:2},
        {type:'bar',label:'Ausgaben',data:monthly.map(m=>m.totalOut),backgroundColor:'rgba(220,38,38,0.6)',borderColor:'rgb(220,38,38)',borderWidth:1,order:2},
        {type:'line',label:'Kumulativ',data:cumul,borderColor:'rgb(234,179,8)',backgroundColor:'rgba(234,179,8,0.1)',borderWidth:2,pointRadius:4,fill:true,tension:0.3,yAxisID:'y2',order:1},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{size:12}}}},scales:{
        x:{grid:{color:gc},ticks:{color:tc}},
        y:{grid:{color:gc},ticks:{color:tc,callback:v=>fmt(v)},title:{display:true,text:'Monatlich',color:tc}},
        y2:{position:'right',grid:{display:false},ticks:{color:'rgb(234,179,8)',callback:v=>fmt(v)},title:{display:true,text:'Kumulativ',color:'rgb(234,179,8)'}},
      }}
    });
    return()=>{if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}};
  },[monthly,cumul]);

  return(
    <div className="p-4 md:p-6 space-y-5">
      <div><h1 className="text-xl font-bold">Liquiditätsplanung</h1><p className="text-sm text-muted-foreground">Saison 2026/27 &middot; Juli bis Juni</p></div>

      <Card className="p-5">
        <div className="flex justify-between items-center mb-3">
          <h2 className="text-sm font-semibold">Pflichtspiele pro Monat</h2>
          <span className="text-xs text-muted-foreground">Gesamt: {spielplan.reduce((a,b)=>a+b,0)} Spiele &middot; wirkt auf "Pro Spiel"-Kostenstellen</span>
        </div>
        <div className="overflow-x-auto">
          <div className="grid grid-cols-12 gap-2 min-w-[650px]">
            {MONTHS.map((m,i)=>(
              <div key={m} className="text-center">
                <div className="text-xs text-muted-foreground mb-1">{m}</div>
                <NumInput
                  value={spielplan[i]}
                  onChange={v=>{const n=[...spielplan];n[i]=Math.max(0,Math.round(v));setSpielplan(n);}}
                  min={0} max={9}
                  className="text-center px-1 py-1 text-sm"
                />
                <div className="text-xs text-muted-foreground mt-0.5">Sp.</div>
              </div>
            ))}
          </div>
        </div>
      </Card>

      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <StatCard label="Gesamteinnahmen" value={fmt(totInc)} color="text-emerald-600" icon="↑"/>
        <StatCard label="Gesamtausgaben" value={fmt(totOut)} color="text-red-600" icon="↓"/>
        <StatCard label="Ergebnis" value={fmt(totInc-totOut)} color={totInc>=totOut?'text-emerald-600':'text-red-600'} icon={totInc>=totOut?'✓':'!'}/>
      </div>

      <Card className="p-5">
        <h2 className="text-sm font-semibold mb-4">Monatsverlauf Einnahmen / Ausgaben</h2>
        <div style={{height:'300px'}}><canvas ref={chartRef}></canvas></div>
      </Card>

      <Card>
        <div className="overflow-x-auto"><table className="w-full text-sm">
          <thead><tr className="border-b border-border text-xs text-muted-foreground uppercase tracking-wide">
            <th className="px-4 py-3 text-left">Monat</th>
            <th className="px-4 py-3 text-right">Spiele</th>
            <th className="px-4 py-3 text-right text-emerald-600">Einnahmen</th>
            <th className="px-4 py-3 text-right">Spieler</th><th className="px-4 py-3 text-right">Staff</th>
            <th className="px-4 py-3 text-right">Kosten</th>
            <th className="px-4 py-3 text-right text-red-600">Ausgaben</th>
            <th className="px-4 py-3 text-right font-semibold">Saldo</th>
            <th className="px-4 py-3 text-right text-amber-600">Kumulativ</th>
          </tr></thead>
          <tbody>{monthly.map((m,i)=>(
            <tr key={m.label} className="border-b border-border/50 hover:bg-muted/20 transition-colors">
              <td className="px-4 py-2 font-medium">{m.label}</td>
              <td className="px-4 py-2 text-right text-muted-foreground">{m.games}</td>
              <td className="px-4 py-2 text-right text-emerald-600">{fmt(m.incTotal)}</td>
              <td className="px-4 py-2 text-right text-muted-foreground">{fmt(m.playerCost)}</td>
              <td className="px-4 py-2 text-right text-muted-foreground">{fmt(m.staffCost)}</td>
              <td className="px-4 py-2 text-right text-muted-foreground">{fmt(m.costTotal)}</td>
              <td className="px-4 py-2 text-right text-red-600">{fmt(m.totalOut)}</td>
              <td className={'px-4 py-2 text-right font-semibold '+(m.net>=0?'text-emerald-600':'text-red-600')}>{fmt(m.net)}</td>
              <td className={'px-4 py-2 text-right font-semibold '+(cumul[i]>=0?'text-amber-600':'text-red-600')}>{fmt(cumul[i])}</td>
            </tr>
          ))}</tbody>
          <tfoot><tr className="bg-muted/40 font-bold border-t-2 border-border text-sm">
            <td className="px-4 py-2">Gesamt</td>
            <td className="px-4 py-2 text-right">{spielplan.reduce((a,b)=>a+b,0)}</td>
            <td className="px-4 py-2 text-right text-emerald-600">{fmt(totInc)}</td>
            <td className="px-4 py-2 text-right">{fmt(monthly.reduce((s,m)=>s+m.playerCost,0))}</td>
            <td className="px-4 py-2 text-right">{fmt(monthly.reduce((s,m)=>s+m.staffCost,0))}</td>
            <td className="px-4 py-2 text-right">{fmt(monthly.reduce((s,m)=>s+m.costTotal,0))}</td>
            <td className="px-4 py-2 text-right text-red-600">{fmt(totOut)}</td>

// ─── KALENDER / TERMINE ───────────────────────────────────────────────────────
const isMatchTyp=t=>['regionalliga','pokal','testspiel'].includes(t);
const terminTitel=e=>{
  if(isMatchTyp(e.type)&&e.title) return e.home===false?(e.title+' – FK Bregalnica Štip'):('FK Bregalnica Štip – '+e.title);
  return e.title||tTyp(e.type).label;
};
const isoOf=d=>{const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;};
const addDaysIso=(iso,n)=>{const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return isoOf(d);};
const fmtShort=iso=>{const d=new Date(iso+'T00:00:00');return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.';};
const eventsOnDate=(events,iso)=>events.filter(e=>e.date&&iso>=e.date&&iso<=(e.dateEnd||e.date)).sort((a,b)=>(a.timeStart||'99').localeCompare(b.timeStart||'99'));
const sortTermine=arr=>[...arr].filter(e=>e.date).sort((a,b)=>(a.date+(a.timeStart||'99')).localeCompare(b.date+(b.timeStart||'99')));
function buildMonthGrid(year,month){
  const first=new Date(year,month,1);
  const startDow=(first.getDay()+6)%7;
  const days=new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(new Date(year,month,d));
  while(cells.length%7!==0)cells.push(null);
  return cells;
}

// ── ICS Export (Apple/Google Kalender) ──
function downloadICS(events,geburtstage){
  const escICS=s=>String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  const dtT=(iso,time)=>{const [y,m,d]=iso.split('-');const [hh,mm]=(time||'00:00').split(':');return y+m+d+'T'+hh.padStart(2,'0')+mm.padStart(2,'0')+'00';};
  const addH=(t,h)=>{const [hh,mm]=t.split(':').map(Number);return String((hh+h)%24).padStart(2,'0')+':'+String(mm).padStart(2,'0');};
  const stamp=dtT(isoOf(new Date()),new Date().getHours()+':'+new Date().getMinutes());
  const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//FK Bregalnica Štip//Terminkalender//DE','CALSCALE:GREGORIAN','METHOD:PUBLISH','X-WR-CALNAME:FK Bregalnica Štip – Termine','X-WR-TIMEZONE:Europe/Berlin'];
  sortTermine(events).forEach(e=>{
    const t=tTyp(e.type), titel=terminTitel(e), mehrtag=e.dateEnd&&e.dateEnd>e.date;
    L.push('BEGIN:VEVENT','UID:'+(e.id||uid())+'@bregalnica-stip','DTSTAMP:'+stamp);
    if(e.timeStart){
      L.push('DTSTART:'+dtT(e.date,e.timeStart));
      L.push('DTEND:'+dtT(mehrtag?e.dateEnd:e.date,e.timeEnd||addH(e.timeStart,2)));
    }else{
      L.push('DTSTART;VALUE=DATE:'+e.date.replace(/-/g,''));
      L.push('DTEND;VALUE=DATE:'+addDaysIso(mehrtag?e.dateEnd:e.date,1).replace(/-/g,''));
    }
    L.push('SUMMARY:'+escICS(t.icon+' '+titel));
    if(e.location)L.push('LOCATION:'+escICS(e.location));
    const desc=[t.label,e.notes].filter(Boolean).join(' — ');
    if(desc)L.push('DESCRIPTION:'+escICS(desc));
    L.push('END:VEVENT');
  });
  // Geburtstage als jaehrlich wiederkehrende Ganztags-Termine
  (geburtstage||[]).forEach(p=>{
    if(!p||!p.geburtstag||!p.name||p.geburtstag.length<10)return;
    L.push('BEGIN:VEVENT','UID:geb-'+escICS(p.id||p.name)+'@bregalnica-stip','DTSTAMP:'+stamp);
    L.push('DTSTART;VALUE=DATE:'+p.geburtstag.replace(/-/g,''));
    L.push('DTEND;VALUE=DATE:'+addDaysIso(p.geburtstag,1).replace(/-/g,''));
    L.push('RRULE:FREQ=YEARLY');
    L.push('SUMMARY:'+escICS('🎂 '+p.name+' (Geburtstag)'));
    L.push('END:VEVENT');
  });
  L.push('END:VCALENDAR');
  const blob=new Blob([L.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='bregalnica-termine.ics';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

// ─── TRAINING / ANWESENHEIT ───────────────────────────────────────────────────
const ANW_GRUENDE=['Krank','Verletzt','Urlaub','Arbeit/Schule','Entschuldigt','Unentschuldigt','Sonstiges'];
const GRUND_FARBE={'Krank':'#f59e0b','Verletzt':'#dc2626','Urlaub':'#3b82f6','Arbeit/Schule':'#8b5cf6','Entschuldigt':'#64748b','Unentschuldigt':'#111827','Sonstiges':'#94a3b8','Ohne Angabe':'#cbd5e1'};
function attStats(playerId,events,anwMap){
  // Default: anwesend. Nur explizit als abwesend (p===false) markierte Eintraege zaehlen als gefehlt.
  let present=0,absent=0;const reasons={};
  (events||[]).forEach(ev=>{const rec=anwMap&&anwMap[ev.id];const e=rec&&rec.entries&&rec.entries[playerId];
    if(e&&e.p===false){absent++;const r=e.reason||'Ohne Angabe';reasons[r]=(reasons[r]||0)+1;}
    else present++;});
  return {present,absent,total:present+absent,reasons};
}
function Donut({present,absent,size=148}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||typeof Chart==='undefined')return;
    if(inst.current){inst.current.destroy();inst.current=null;}
    const total=present+absent;
    inst.current=new Chart(ref.current,{type:'doughnut',
      data:{labels:['Anwesend','Abwesend'],datasets:[{data:total?[present,absent]:[1,0],backgroundColor:total?['#16a34a','#dc2626']:['#e5e7eb','#e5e7eb'],borderWidth:0}]},
      options:{responsive:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{enabled:total>0}}}});
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[present,absent]);
  const total=present+absent,quote=total?Math.round(present/total*100):null;
  return(
    <div className="relative shrink-0" style={{width:size,height:size}}>
      <canvas ref={ref} width={size} height={size}/>
      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
        <span className="text-2xl font-extrabold leading-none">{quote==null?'–':quote+'%'}</span>
        <span className="text-[10px] text-muted-foreground font-medium mt-0.5">anwesend</span>
      </div>
    </div>
  );
}
function PlayerProfile({player,events,anwMap,talks,onAddTalk,onDeleteTalk,onClose}){
  const st=attStats(player.id,events,anwMap);
  const history=useMemo(()=>[...(events||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||'')),[events]);

    <Modal open onClose={onClose} title={player.name||'Spieler'} wide>

        </div>
        {Object.keys(st.reasons).length>0&&(
          <div>
            <h4 className="text-xs font-bold uppercase tracking-wider text-muted-foreground mb-2">Fehlgründe</h4>
            <div className="flex flex-wrap gap-2">
              {Object.entries(st.reasons).sort((a,b)=>b[1]-a[1]).map(([r,n])=>(
                <span key={r} className="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full" style={{background:(GRUND_FARBE[r]||'#94a3b8')+'1f',color:GRUND_FARBE[r]||'#475569'}}><span className="w-1.5 h-1.5 rounded-full" style={{background:GRUND_FARBE[r]||'#94a3b8'}}/>{r}: {n}×</span>
              ))}
            </div>
          </div>
        )}
        <div>
          <div className="flex items-center justify-between mb-2">
            <h4 className="text-xs font-bold uppercase tracking-wider text-muted-foreground">Einzelgespräche</h4>
            <span className="text-[11px] font-semibold" style={{color:gespraechFarbe(lastTs)}}>Letztes: {seitText(lastTs)}</span>
          </div>
          <div className="rounded-xl border border-border p-3 space-y-2 mb-3 bg-muted/20">
            <div className="flex items-center gap-2">
              <input type="date" value={gDate} max={isoOf(new Date())} onChange={e=>setGDate(e.target.value)} className="rounded-md border border-border bg-background px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/40"/>
              <span className="text-xs text-muted-foreground">Datum des Gesprächs</span>
            </div>
            <textarea value={gText} onChange={e=>setGText(e.target.value)} rows={2} placeholder="Was wurde besprochen? (Themen, Vereinbarungen, Stimmung …)" className="w-full rounded-md border border-border bg-background px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-primary/40"/>
            <div className="flex justify-end">
              <Btn onClick={speichernGespraech} disabled={!gText.trim()}>+ Gespräch speichern</Btn>
            </div>
          </div>
          {(talks||[]).length===0
            ?<p className="text-sm text-muted-foreground mb-5">Noch kein Gespräch dokumentiert.</p>
            :<div className="space-y-2 max-h-64 overflow-y-auto pr-1 mb-5">
              {(talks||[]).map(t=>(
                <div key={t.id} className="rounded-lg border border-border p-3">
                  <div className="flex items-center justify-between gap-2 mb-1">
                    <span className="text-xs font-bold text-foreground">{fmtDatumLang(t.date)}</span>
                    {onDeleteTalk&&<DelBtn onDelete={()=>onDeleteTalk(t.id)}/>}

                  <p className="text-sm whitespace-pre-wrap text-foreground/90">{t.text}</p>
                </div>
              ))}
            </div>}
        </div>
        <div>
          <h4 className="text-xs font-bold uppercase tracking-wider text-muted-foreground mb-2">Trainings-Verlauf</h4>
          {history.length===0
            ?<p className="text-sm text-muted-foreground">Noch keine Trainings im Kalender (bis heute).</p>
            :<div className="space-y-1.5 max-h-72 overflow-y-auto pr-1">
              {history.map(ev=>{const rec=anwMap&&anwMap[ev.id];const e=rec&&rec.entries&&rec.entries[player.id];const fehlt=e&&e.p===false;return(
                <div key={ev.id} className="flex items-center gap-3 rounded-lg border border-border px-3 py-2">
                  <span className="text-sm font-semibold w-20 shrink-0">{fmtShort(ev.date)}</span>
                  {!fehlt
                    ?<span className="inline-flex items-center gap-1.5 text-xs font-semibold text-emerald-700"><span className="w-2 h-2 rounded-full bg-emerald-500"/>Anwesend</span>
                    :<span className="inline-flex items-center gap-1.5 text-xs font-semibold text-red-700"><span className="w-2 h-2 rounded-full bg-red-500"/>Gefehlt{e.reason?' · '+e.reason:''}</span>}
                  <span className="text-xs text-muted-foreground truncate ml-auto">{terminTitel(ev)}</span>
                </div>
              );})}
            </div>}
        </div>
      </div>
    </Modal>
  );

function EventAttForm({event,roster,record,onSave,onClose}){

  const anwesend=(roster||[]).filter(p=>entries[p.id]&&entries[p.id].p).length;
  const submit=()=>{onSave(event.id,entries);};
  return(
    <div className="space-y-4">

      </div>
      <div className="flex items-center justify-between">

              <div className="flex-1 min-w-0"><div className="text-sm font-semibold truncate">{p.name||'–'}</div>{p.position&&<div className="text-[11px] text-muted-foreground truncate">{p.position}</div>}</div>
              <div className="flex rounded-lg overflow-hidden border border-border shrink-0">

                <button onClick={()=>setE(p.id,{p:false})} className={cx('px-3 py-1.5 text-xs font-semibold cursor-pointer transition-colors border-l border-border',!e.p?'bg-red-600 text-white':'bg-card text-muted-foreground hover:bg-accent')}>✗ Fehlt</button>

                  <button key={g} onClick={()=>setE(p.id,{reason:g})} className={cx('px-2.5 py-1 rounded-full text-[11px] font-medium border cursor-pointer transition-colors',e.reason===g?'text-white border-transparent':'border-border bg-card hover:bg-accent text-muted-foreground')} style={e.reason===g?{background:GRUND_FARBE[g]||'#64748b'}:undefined}>{g}</button>
                ))}
              </div>
            )}
          </div>
        );})}
      </div>
      <div className="flex items-center justify-end gap-2 pt-1">
        <Btn variant="outline" onClick={onClose}>Abbrechen</Btn><Btn onClick={submit}>Speichern</Btn>
      </div>
    </div>
  );
}
// ─── EINZELGESPRÄCHE ──────────────────────────────────────────────────────────
const tageSeit=iso=>{if(!iso)return null;const d=new Date(iso+'T00:00:00');if(isNaN(d))return null;const n=new Date();const r=new Date(n.getFullYear(),n.getMonth(),n.getDate());return Math.round((r-d)/86400000);};
const seitText=t=>t==null?'noch nie':t<=0?'heute':t===1?'gestern':t<7?('vor '+t+' Tagen'):t<14?'vor 1 Woche':t<56?('vor '+Math.floor(t/7)+' Wochen'):t<365?('vor '+Math.floor(t/30)+' Monaten'):'vor über 1 Jahr';
// Farbe nach Aktualität des letzten Gesprächs: rot = noch nie / über 4 Wochen, gelb = 3–4 Wochen, grün = unter 3 Wochen
const gespraechFarbe=t=>t==null?'#dc2626':t<21?'#16a34a':t<=28?'#f59e0b':'#dc2626';
function TrainingPage({roster,anwesenheit,termine,onChange,gespraeche,onChangeGespraeche}){
  const list=anwesenheit||[];
  const todayIso=isoOf(new Date());
  const players=roster||[];
  const [modal,setModal]=useState(false);
  const [editEvent,setEditEvent]=useState(null);
  const [profileId,setProfileId]=useState(null);
  // Anwesenheits-Datensaetze liegen unter der Kalender-Termin-id (gespeichert werden NUR Abwesenheiten).
  const anwMap=useMemo(()=>{const m={};list.forEach(r=>{if(r&&r.id)m[r.id]=r;});return m;},[list]);
  // Termine aus dem Kalender (ohne "Frei"), bis einschliesslich heute – diese kann man bewerten.
  const events=useMemo(()=>(termine||[]).filter(e=>e.date&&e.type!=='sonstiges'&&e.date<=todayIso).sort((a,b)=>(b.date+(b.timeStart||'')).localeCompare(a.date+(a.timeStart||''))),[termine,todayIso]);
  // Quote/Donut: ausschliesslich Trainings.
  const countingEvents=useMemo(()=>events.filter(e=>e.type==='training'),[events]);
  const shown=useMemo(()=>[...players].sort((a,b)=>(a.name||'').localeCompare(b.name||'')),[players]);
  const teamTot=useMemo(()=>{let p=0,a=0;countingEvents.forEach(ev=>{const rec=anwMap[ev.id];players.forEach(pl=>{const e=rec&&rec.entries&&rec.entries[pl.id];if(e&&e.p===false)a++;else p++;});});return {p,a};},[countingEvents,anwMap,players]);
  const profile=profileId?players.find(p=>p.id===profileId):null;
  // Speichern: nur Abwesenheiten ablegen; ist alles anwesend -> Datensatz entfernen (haelt die Daten schlank).
  const saveAtt=(eventId,entries)=>{const abs={};Object.entries(entries||{}).forEach(([pid,e])=>{if(e&&e.p===false)abs[pid]={p:false,reason:e.reason||''};});const rest=list.filter(r=>r.id!==eventId);onChange(Object.keys(abs).length?[...rest,{id:eventId,entries:abs}]:rest);setModal(false);setEditEvent(null);};
  const openEvent=ev=>{setEditEvent(ev);setModal(true);};
  // Einzelgespräche: flache Liste {id,playerId,date,text} -> pro Spieler nach Datum (neueste zuerst) gruppieren.
  const talkMap=useMemo(()=>{const m={};(gespraeche||[]).forEach(t=>{if(t&&t.playerId)(m[t.playerId]=m[t.playerId]||[]).push(t);});Object.keys(m).forEach(k=>m[k].sort((a,b)=>(b.date||'').localeCompare(a.date||'')));return m;},[gespraeche]);
  const addTalk=(playerId,date,text)=>{onChangeGespraeche&&onChangeGespraeche([...(gespraeche||[]),{id:uid(),playerId,date:date||todayIso,text:text||''}]);};
  const delTalk=id=>{onChangeGespraeche&&onChangeGespraeche((gespraeche||[]).filter(t=>t.id!==id));};

  if(players.length===0)return(
    <div className="p-4 md:p-6">
      <div className="flex items-center gap-3.5 mb-5">
        <div className="w-12 h-12 rounded-2xl bg-white flex items-center justify-center shadow-soft ring-1 ring-border/70 shrink-0 overflow-hidden"><LogoMark className="w-9 h-9 object-contain"/></div>
        <div><h1 className="text-2xl font-bold tracking-tight">Kader</h1><p className="text-sm text-muted-foreground">Anwesenheit im Training</p></div>
      </div>
      <Card className="p-8 text-center">
        <div className="text-4xl mb-3 opacity-30">⚽</div>
        <p className="text-sm text-muted-foreground max-w-md mx-auto">Der Kader ist noch nicht verfügbar. Sobald der Admin die App einmal geöffnet hat (überträgt den Kader) und die Firestore-Regeln aktualisiert sind, erscheinen hier die Spieler.</p>
      </Card>
    </div>
  );

  return(
    <div className="p-4 md:p-6 space-y-5">
      <div className="flex items-center gap-3.5">
        <div className="w-12 h-12 rounded-2xl bg-white flex items-center justify-center shadow-soft ring-1 ring-border/70 shrink-0 overflow-hidden"><LogoMark className="w-9 h-9 object-contain"/></div>
        <div><h1 className="text-2xl font-bold tracking-tight">Kader</h1><p className="text-sm text-muted-foreground">{players.length} Spieler · {countingEvents.length} Trainings gewertet</p></div>
      </div>

      <Card className="p-5 flex flex-col sm:flex-row items-center gap-6">
        <Donut present={teamTot.p} absent={teamTot.a}/>
        <div className="flex-1 w-full">
          <h3 className="text-sm font-semibold mb-1">Trainingsbeteiligung gesamt</h3>
          <p className="text-[11px] text-muted-foreground mb-3">Nur Trainings zählen – Spiele, Teamabende &amp; Co. fließen nicht ein.</p>
          <div className="grid grid-cols-3 gap-2 text-center">
            <div className="rounded-xl bg-emerald-50 p-3"><div className="text-xl font-bold text-emerald-700">{teamTot.p}</div><div className="text-[11px] text-emerald-700/80 font-medium">Anwesend</div></div>
            <div className="rounded-xl bg-red-50 p-3"><div className="text-xl font-bold text-red-700">{teamTot.a}</div><div className="text-[11px] text-red-700/80 font-medium">Gefehlt</div></div>
            <div className="rounded-xl bg-muted p-3"><div className="text-xl font-bold">{countingEvents.length}</div><div className="text-[11px] text-muted-foreground font-medium">Trainings</div></div>
          </div>
        </div>
      </Card>

      <Card>
        <div className="flex items-center gap-3 px-4 py-2 border-b border-border bg-muted/30 text-[10px] font-bold uppercase tracking-wider text-muted-foreground/70">
          <div className="flex-1 min-w-0">Spieler</div>
          <div className="w-28 shrink-0 hidden sm:block text-center">Anwesenheit</div>
          <div className="w-12 sm:w-14 text-right shrink-0">Quote</div>
          <div className="w-[84px] sm:w-28 text-right shrink-0">💬 Gespräch</div>
          <span className="w-2 shrink-0"/>
        </div>
        <div className="divide-y divide-border">
          {shown.map(p=>{const st=attStats(p.id,countingEvents,anwMap);const q=st.total?Math.round(st.present/st.total*100):null;const talks=talkMap[p.id]||[];const last=talks[0];const ts=last?tageSeit(last.date):null;return(
            <button key={p.id} onClick={()=>setProfileId(p.id)} className="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-accent/40 transition-colors cursor-pointer">
              <div className="flex-1 min-w-0">
                <div className="font-semibold text-sm truncate">{p.name||'–'}</div>
                <div className="text-[11px] text-muted-foreground truncate">{p.position||'—'}</div>
              </div>
              <div className="w-28 shrink-0 hidden sm:block">
                <div className="h-2 rounded-full bg-muted overflow-hidden"><div className="h-full rounded-full" style={{width:(q||0)+'%',background:q==null?'#cbd5e1':q>=75?'#16a34a':q>=50?'#f59e0b':'#dc2626'}}/></div>
              </div>
              <div className="w-12 sm:w-14 text-right shrink-0"><span className="text-sm font-bold">{q==null?'–':q+'%'}</span></div>
              <div className="w-[84px] sm:w-28 text-right shrink-0">
                <span className="inline-flex items-center gap-1 text-[11px] font-semibold whitespace-nowrap" style={{color:gespraechFarbe(ts)}}>
                  <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{background:gespraechFarbe(ts)}}/>{seitText(ts)}
                </span>
              </div>
              <span className="text-muted-foreground shrink-0">›</span>
            </button>
          );})}
        </div>
      </Card>

      <div>
        <h3 className="text-xs font-bold uppercase tracking-wider text-muted-foreground mb-2.5 px-1">Termine aus dem Kalender</h3>
        {events.length===0
          ?<Card className="p-6 text-center"><p className="text-sm text-muted-foreground">Noch keine vergangenen Termine. Lege im <strong>Kalender</strong> Termine an – sie erscheinen hier automatisch zum Abhaken.</p></Card>
          :<div className="space-y-2">
            {events.map(ev=>{const t=tTyp(ev.type);const zaehlt=ev.type==='training';const rec=anwMap[ev.id];const absent=rec?Object.values(rec.entries||{}).filter(e=>e&&e.p===false).length:0;const pres=players.length-absent;const dd=new Date(ev.date+'T00:00:00');return(
              <Card key={ev.id} className="p-3 flex items-center gap-3.5 hover:shadow-card transition-all cursor-pointer" onClick={()=>openEvent(ev)}>
                <div className="w-12 shrink-0 flex flex-col items-center justify-center rounded-xl py-1.5" style={{background:t.hex+'1a'}}>
                  <div className="text-lg font-extrabold leading-none" style={{color:t.hex}}>{String(dd.getDate()).padStart(2,'0')}</div>
                  <div className="text-[10px] uppercase font-semibold mt-0.5" style={{color:t.hex}}>{WTAGE[(dd.getDay()+6)%7]}</div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold truncate flex items-center gap-1.5"><TypIcon t={t} className="h-[1.1em] w-[1.1em] shrink-0"/><span className="truncate">{terminTitel(ev)}</span></div>
                  <div className="text-xs text-muted-foreground truncate">{pres}/{players.length} anwesend{absent>0?' · '+absent+' fehlt':''}</div>
                </div>
                {zaehlt
                  ?<span className="text-[10px] font-bold uppercase text-white px-2 py-1 rounded-full shrink-0 hidden sm:inline" style={{background:t.hex}}>Training</span>
                  :<span className="text-[10px] font-bold uppercase text-muted-foreground bg-muted px-2 py-1 rounded-full shrink-0 hidden sm:inline">zählt nicht</span>}
                <span className="text-muted-foreground shrink-0">✎</span>
              </Card>
            );})}
          </div>}
      </div>

      <Modal open={modal} onClose={()=>{setModal(false);setEditEvent(null);}} title="Anwesenheit" wide>
        {editEvent&&<EventAttForm event={editEvent} roster={players} record={anwMap[editEvent.id]} onSave={saveAtt} onClose={()=>{setModal(false);setEditEvent(null);}}/>}
      </Modal>
      {profile&&<PlayerProfile player={profile} events={countingEvents} anwMap={anwMap} talks={talkMap[profile.id]||[]} onAddTalk={addTalk} onDeleteTalk={delTalk} onClose={()=>setProfileId(null)}/>}
    </div>
  );
}

const ROLE_ICON={admin:'🛡️',trainer:'📋',spieler:'⚽'};
function LoginScreen(){
  const [selRole,setSelRole]=useState('admin');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [show,setShow]=useState(false);

  const submit=async e=>{
    e.preventDefault();
    setErr('');setLoading(true);
    try{
      await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
      await auth.signInWithEmailAndPassword(AUTH_EMAIL[selRole],pw);
      // Erfolg → onAuthStateChanged in Root übernimmt
    }catch(ex){
      const c=ex&&ex.code||'';
      if(c==='auth/wrong-password'||c==='auth/invalid-credential'||c==='auth/invalid-login-credentials')setErr('Falsches Passwort für '+ROLLE_LBL[selRole]+'.');
      else if(c==='auth/user-not-found')setErr('Für diese Rolle wurde noch kein Zugang angelegt.');
      else if(c==='auth/too-many-requests')setErr('Zu viele Versuche. Bitte später erneut versuchen.');
      else if(c==='auth/operation-not-allowed'||c==='auth/configuration-not-found')setErr('Anmeldung (E-Mail/Passwort) ist in Firebase noch nicht aktiviert.');
      else if(c==='auth/network-request-failed')setErr('Keine Verbindung. Internet prüfen.');
      else setErr('Anmeldung fehlgeschlagen.'+(c?' ('+c+')':''));
      setPw('');setLoading(false);
    }

  return(
    <div className="min-h-screen bg-background flex flex-col items-center justify-center p-4 relative overflow-hidden">

          <h1 className="text-[22px] font-bold tracking-tight">FK Bregalnica Štip</h1>
          <p className="text-sm text-muted-foreground mt-1">Budget &amp; Organisation · Saison 2026/27</p>
        </div>
        <div className="rounded-2xl border border-border bg-card shadow-card p-6 sm:p-7">
          <form onSubmit={submit} className="space-y-5">
            {VALID_ROLES.length>1&&<div className="space-y-2">
              <label className="text-xs font-semibold text-muted-foreground uppercase tracking-wider">Anmelden als</label>
              <div className="grid grid-cols-3 gap-2">
                {VALID_ROLES.map(r=>{const active=selRole===r;return(
                  <button key={r} type="button" onClick={()=>{setSelRole(r);setErr('');}} className={cx('relative flex flex-col items-center gap-1.5 py-3 rounded-xl border text-xs font-semibold transition-all cursor-pointer',active?'border-primary/40 bg-primary/[0.06] text-primary shadow-soft':'border-border bg-background hover:bg-accent text-muted-foreground')}>
                    <span className={cx('text-xl transition-transform duration-200',active&&'scale-110')}>{ROLE_ICON[r]}</span>{ROLLE_LBL[r]}
                    {active&&<span className="absolute top-1.5 right-1.5 w-1.5 h-1.5 rounded-full bg-primary"/>}
                  </button>
                );})}
              </div>
            </div>}
            <div className="space-y-2">
              <label className="text-xs font-semibold text-muted-foreground uppercase tracking-wider">Passwort</label>
              <div className="relative">
                <input
                  type={show?'text':'password'}
                  value={pw}
                  onChange={e=>{setPw(e.target.value);setErr('');}}
                  placeholder="Passwort eingeben"
                  autoFocus
                  className={cx('w-full rounded-xl border bg-background px-3.5 py-3 text-sm pr-11 transition-shadow focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary/40',err?'border-red-400':'border-border')}
                />
                <button type="button" onClick={()=>setShow(s=>!s)} className="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground text-base cursor-pointer transition-colors">
                  {show?'🙈':'👁'}
                </button>
              </div>
              {err&&<p className="flex items-center gap-1.5 text-xs text-red-600 font-medium"><span>⚠️</span>{err}</p>}
            </div>
            <button type="submit" disabled={!pw||loading} className="w-full inline-flex items-center justify-center gap-2 bg-primary text-primary-foreground rounded-xl py-3 text-sm font-semibold shadow-soft hover:brightness-110 active:brightness-95 transition-all disabled:opacity-40 cursor-pointer disabled:cursor-not-allowed">
              {loading&&<span className="w-4 h-4 rounded-full border-2 border-white/40 border-t-white animate-spin"/>}
              {loading?'Anmelden…':'Anmelden'}
            </button>
          </form>

        <p className="text-center text-xs text-muted-foreground mt-6">🔒 Geschützter Admin-Zugang</p>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
const NAV=[
  {id:'uebersicht',label:'Übersicht',icon:'⊞'},
  {id:'kader',label:'Kader',icon:'⚽'},
  {id:'staff',label:'Staff',icon:'👤'},
  {id:'kosten',label:'Kostenstellen',icon:'📋'},
  {id:'einnahmen',label:'Einnahmen',icon:'💰'},
  {id:'liquiditaet',label:'Liquidität',icon:'📈'},
  {id:'wohnungen',label:'Wohnungen',icon:'🏠'},
  {id:'termine',label:'Kalender',icon:'📅'},
];

function App({role,onLogout}){
  const isAdmin=role==='admin';
  const canEditTermine=role==='admin'||role==='trainer';
  const canTraining=role==='admin'||role==='trainer';
  const navItems=[...NAV,{id:'training',label:'Anwesenheit',icon:'📝'}];
  const allowedPages=navItems.map(n=>n.id);
  const [page,setPage]=useState(isAdmin?'uebersicht':'termine');
  const [players,setPlayers]=useState([]);
  const [staff,setStaff]=useState([]);
  const [costs,setCosts]=useState([]);
  const [income,setIncome]=useState([]);
  const [spielplan,setSpielplan]=useState(DEFAULT_SP);
  const [wohnungen,setWohnungen]=useState([]);
  const [termine,setTermine]=useState([]);
  const [kader,setKader]=useState([]);
  const [anwesenheit,setAnwesenheit]=useState([]);
  const [gespraeche,setGespraeche]=useState([]);
  const [dark,setDark]=useState(()=>load(K.th,false));
  const [dbLoading,setDbLoading]=useState(true);
  const [dbError,setDbError]=useState(null);
  // syncRef holds the last value received FROM Firestore (stringified) to avoid write-back loops.
  // Pre-filled with defaults so the initial render never overwrites Firestore before data has loaded.
  const syncRef=useRef({
    players:JSON.stringify([]),
    staff:JSON.stringify([]),
    costs:JSON.stringify([]),
    income:JSON.stringify([]),
    spielplan:JSON.stringify(DEFAULT_SP),
    wohnungen:JSON.stringify([]),
    termine:JSON.stringify([]),
    kader:JSON.stringify([]),
    anwesenheit:JSON.stringify([]),
    gespraeche:JSON.stringify([]),
  });

  useEffect(()=>{document.documentElement.classList.toggle('dark',dark);save(K.th,dark);},[dark]);

  // ── Firestore real-time listeners (rollenabhängig) ──────────────────────────
  // Admin lädt alle Daten; Trainer/Spieler laden NUR den Kalender (termine).
  // Die Budgetdaten werden für Nicht-Admins gar nicht erst angefragt.
  useEffect(()=>{
    const unsub=[];
    // [doc, setter, default, optional?]  – optional-Docs lösen bei Fehler KEINEN App-Fehler aus
    const jobs=isAdmin
      ? [['players',setPlayers,[]],['staff',setStaff,[]],['costs',setCosts,[]],['income',setIncome,[]],['spielplan',setSpielplan,DEFAULT_SP],['wohnungen',setWohnungen,[]],['termine',setTermine,[]],['anwesenheit',setAnwesenheit,[],true],['gespraeche',setGespraeche,[],true]]
      : role==='trainer'
        ? [['termine',setTermine,[]],['kader',setKader,[],true],['anwesenheit',setAnwesenheit,[],true],['gespraeche',setGespraeche,[],true]]
        : [['termine',setTermine,[]],['kader',setKader,[],true]];
    let pending=jobs.length;
    const done=()=>{pending--;if(pending<=0)setDbLoading(false);};
    const listen=(doc,setter,dflt,optional)=>{
      const u=db.collection(COL).doc(doc).onSnapshot(snap=>{
        const data=(snap.exists&&snap.data()&&snap.data().data!==undefined)?snap.data().data:dflt;
        syncRef.current[doc]=JSON.stringify(data);
        setter(data);
        done();
      },err=>{console.error('Firestore',doc,err);if(!optional)setDbError(String(err));done();});
      unsub.push(u);
    };
    jobs.forEach(([doc,setter,dflt,optional])=>listen(doc,setter,dflt,optional));
    return()=>unsub.forEach(u=>u());
  },[]);

  // ── Save to Firestore (skip if value came from Firestore to avoid loops) ──
  // Budget-Schreibzugriffe nur für Admin, Kalender-Schreibzugriffe nur für Admin/Trainer.
  useEffect(()=>{if(!isAdmin)return;const s=JSON.stringify(players);if(syncRef.current.players===s)return;syncRef.current.players=s;fsSet('players',players);},[players]);
  useEffect(()=>{if(!isAdmin)return;const s=JSON.stringify(staff);if(syncRef.current.staff===s)return;syncRef.current.staff=s;fsSet('staff',staff);},[staff]);
  useEffect(()=>{if(!isAdmin)return;const s=JSON.stringify(costs);if(syncRef.current.costs===s)return;syncRef.current.costs=s;fsSet('costs',costs);},[costs]);
  useEffect(()=>{if(!isAdmin)return;const s=JSON.stringify(income);if(syncRef.current.income===s)return;syncRef.current.income=s;fsSet('income',income);},[income]);
  useEffect(()=>{if(!isAdmin)return;const s=JSON.stringify(spielplan);if(syncRef.current.spielplan===s)return;syncRef.current.spielplan=s;fsSet('spielplan',spielplan);},[spielplan]);
  useEffect(()=>{if(!isAdmin)return;const s=JSON.stringify(wohnungen);if(syncRef.current.wohnungen===s)return;syncRef.current.wohnungen=s;fsSet('wohnungen',wohnungen);},[wohnungen]);
  useEffect(()=>{if(!canEditTermine)return;const s=JSON.stringify(termine);if(syncRef.current.termine===s)return;syncRef.current.termine=s;fsSet('termine',termine);},[termine]);
  // Kader-Spiegel: Admin schreibt NUR Name/Position/Team (keine Gehälter!) nach 'kader' – für den Trainer lesbar.
  useEffect(()=>{if(!isAdmin)return;const mirror=(players||[]).map(p=>({id:p.id,name:p.name,position:p.position,geburtstag:p.geburtstag||''}));const s=JSON.stringify(mirror);if(syncRef.current.kader===s)return;syncRef.current.kader=s;fsSet('kader',mirror);},[players]);
  // Anwesenheit: Admin + Trainer dürfen schreiben.
  useEffect(()=>{if(!canTraining)return;const s=JSON.stringify(anwesenheit);if(syncRef.current.anwesenheit===s)return;syncRef.current.anwesenheit=s;fsSet('anwesenheit',anwesenheit);},[anwesenheit]);
  useEffect(()=>{if(!canTraining)return;const s=JSON.stringify(gespraeche);if(syncRef.current.gespraeche===s)return;syncRef.current.gespraeche=s;fsSet('gespraeche',gespraeche);},[gespraeche]);

  if(dbLoading)return(
    <div className="flex items-center justify-center h-screen bg-background">
      <div className="text-center space-y-3">
        <div className="text-5xl animate-pulse">🔥</div>
        <p className="text-muted-foreground text-sm font-medium">Daten werden geladen…</p>
      </div>
    </div>
  );

  if(dbError)return(
    <div className="flex items-center justify-center h-screen bg-background">
      <div className="text-center space-y-4 max-w-md px-4">
        <div className="text-5xl">⚠️</div>
        <h2 className="text-lg font-bold text-red-600">Datenbankfehler</h2>
        <p className="text-sm text-muted-foreground">Daten konnten nicht geladen werden. Möglicherweise stimmen die Firestore-Sicherheitsregeln nicht mit den Konto-UIDs überein.</p>
        <div className="text-xs bg-red-50 text-red-700 p-3 rounded-lg break-all">{dbError}</div>
        <p className="text-xs text-muted-foreground">Firebase Console → Firestore → Regeln prüfen (UIDs der Konten).</p>
        <div className="flex gap-2 justify-center">
          <button onClick={()=>location.reload()} className="bg-primary text-primary-foreground px-4 py-2 rounded-md text-sm font-medium cursor-pointer hover:opacity-90">Neu laden</button>
          <button onClick={()=>auth.signOut()} className="border border-border px-4 py-2 rounded-md text-sm font-medium cursor-pointer hover:bg-accent">Abmelden</button>
        </div>
      </div>
    </div>
  );

  const pages={
    uebersicht:<OverviewPage players={players} staff={staff} costs={costs} income={income} spielplan={spielplan}/>,
    kader:<KaderPage players={players} onChange={setPlayers}/>,
    staff:<StaffPage staff={staff} onChange={setStaff}/>,
    kosten:<KostenPage costs={costs} spielplan={spielplan} onChange={setCosts}/>,
    einnahmen:<EinnahmenPage income={income} onChange={setIncome}/>,
    liquiditaet:<LiquiditaetPage players={players} staff={staff} costs={costs} income={income} spielplan={spielplan} setSpielplan={setSpielplan}/>,
    wohnungen:<WohnungenPage wohnungen={wohnungen} onChange={setWohnungen}/>,
    termine:<TerminePage termine={termine} onChange={setTermine} canEdit={canEditTermine} geburtstage={isAdmin?[...(players||[]),...(staff||[]).map(s=>({...s,istStaff:true}))]:(kader||[])}/>,
    training:<TrainingPage roster={isAdmin?players:kader} anwesenheit={anwesenheit} termine={termine} onChange={setAnwesenheit} gespraeche={gespraeche} onChangeGespraeche={setGespraeche}/>,
  };
  const activePage=allowedPages.includes(page)?page:allowedPages[0];

  return(
    <div className="flex flex-col md:flex-row h-screen overflow-hidden bg-background">
      {/* Desktop sidebar - hidden on mobile */}
      <aside className="hidden md:flex w-56 shrink-0 bg-sidebar text-sidebar-foreground border-r border-sidebar-border flex-col">
        <div className="p-4 border-b border-sidebar-border">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-lg bg-white flex items-center justify-center flex-shrink-0 shadow-sm overflow-hidden"><LogoMark className="w-7 h-7 object-contain"/></div>
            <div><div className="font-bold text-sm leading-tight">FK Bregalnica Štip</div><div className="text-xs opacity-70">Štip – {isAdmin?'Budget 26/27':'Terminkalender'}</div></div>
          </div>
        </div>
        <nav className="flex-1 p-2 space-y-0.5 overflow-y-auto">
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} className={cx('w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors text-left cursor-pointer',activePage===n.id?'bg-sidebar-accent text-sidebar-accent-foreground':'text-sidebar-foreground/80 hover:bg-sidebar-accent/50 hover:text-sidebar-accent-foreground')}>
              <span className="text-base w-5 text-center flex-shrink-0">{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="p-3 border-t border-sidebar-border space-y-0.5">
          <div className="px-3 py-1.5 flex items-center gap-2 text-xs text-sidebar-foreground/60">
            <span>{role==='admin'?'🛡️':role==='trainer'?'📋':'⚽'}</span><span>Angemeldet als <strong className="font-semibold text-sidebar-foreground/80">{ROLLE_LBL[role]}</strong></span>
          </div>
          <button onClick={()=>setDark(d=>!d)} className="w-full flex items-center gap-2 px-3 py-2 rounded-md text-sm text-sidebar-foreground/70 hover:bg-sidebar-accent/50 transition-colors cursor-pointer">
            <span>{dark?'☀':'🌙'}</span><span>{dark?'Light Mode':'Dark Mode'}</span>
          </button>
          <button onClick={onLogout} className="w-full flex items-center gap-2 px-3 py-2 rounded-md text-sm text-sidebar-foreground/50 hover:bg-sidebar-accent/50 hover:text-sidebar-foreground/80 transition-colors cursor-pointer">
            <span>🔒</span><span>Abmelden</span>
          </button>
        </div>
      </aside>

      {/* Mobile top bar */}
      <div className="md:hidden flex items-center justify-between px-4 py-3 bg-sidebar text-sidebar-foreground border-b border-sidebar-border shrink-0">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg bg-white flex items-center justify-center overflow-hidden shadow-sm"><LogoMark className="w-6 h-6 object-contain"/></div>
          <span className="font-bold text-sm">FK Bregalnica Štip</span>
          {!isAdmin&&<span className="text-[10px] font-medium bg-white/15 px-1.5 py-0.5 rounded-full">{ROLLE_LBL[role]}</span>}
        </div>
        <div className="flex items-center gap-1">
          <button onClick={()=>setDark(d=>!d)} className="text-sidebar-foreground/70 cursor-pointer p-2">{dark?'☀':'🌙'}</button>
          <button onClick={onLogout} className="text-sidebar-foreground/50 cursor-pointer p-2">🔒</button>
        </div>
      </div>

      {/* Main content */}
      <main className={cx('flex-1 overflow-y-auto',navItems.length>1?'pb-16 md:pb-0':'')}>{pages[activePage]}</main>

      {/* Mobile bottom nav (nur wenn mehrere Bereiche) */}
      {navItems.length>1&&(
        <nav className="md:hidden fixed bottom-0 left-0 right-0 z-40 bg-sidebar border-t border-sidebar-border flex safe-area-pb">
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} className={cx('flex-1 flex flex-col items-center justify-center py-2 gap-0.5 transition-colors cursor-pointer',activePage===n.id?'text-white':'text-sidebar-foreground/50')}>
              <span className="text-xl leading-none">{n.icon}</span>
              <span className="text-[9px] leading-none font-medium">{n.label.substring(0,7)}</span>
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

function Root(){
  const [authReady,setAuthReady]=useState(false);
  const [role,setRole]=useState(null);
  useEffect(()=>{
    return auth.onAuthStateChanged(user=>{
      const r=user?emailToRole(user.email):null;
      if(user&&!r){ auth.signOut(); setRole(null); } // unbekanntes Konto → abmelden
      else setRole(r);
      setAuthReady(true);
    });
  },[]);
  const logout=()=>auth.signOut();
  if(!authReady)return(
    <div className="flex items-center justify-center h-screen bg-background">
      <div className="text-center space-y-3">
        <div className="w-16 h-16 rounded-2xl bg-white flex items-center justify-center mx-auto shadow-lg overflow-hidden"><LogoMark className="w-12 h-12 object-contain"/></div>
        <p className="text-muted-foreground text-sm font-medium">Lade…</p>
      </div>
    </div>
  );
  if(!role)return<LoginScreen/>;
  return<App key={role} role={role} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>
</body>
</html>
